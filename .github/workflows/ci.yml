name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./... -count=1

  quality-and-build:
    name: Vet, build, and CLI smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build -o ddocs ./cmd/ddocs
      - run: go build -o demon ./cmd/demon
      - run: ./ddocs --help
      - run: ./ddocs --version
      - run: ./ddocs config paths
      - run: ./demon --help
      - run: ./demon --version
      - run: ./demon config paths
